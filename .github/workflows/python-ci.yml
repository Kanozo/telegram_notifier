name: Run Python Project

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  run-main:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file from Secrets
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
        echo "GROUP_TARGET=${{ secrets.GROUP_TARGET }}" >> .env
        echo "SEND_INTERVAL_SECONDS=${{ secrets.SEND_INTERVAL_SECONDS }}" >> .env
        echo "MESSAGE_DELAY_SECONDS=${{ secrets.MESSAGE_DELAY_SECONDS }}" >> .env

    - name: Show .env content (for debugging, hides secrets in logs)
      run: |
        cat .env

    - name: Execute main.py
      run: |
        python main.py